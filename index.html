<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 23rd Birthday, My Sweet Little Bunny</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #2c1810 0%, #4a2c2a 50%, #1a0f0a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        .envelope {
            position: relative;
            width: 100%;
            max-width: 680px;
            animation: slideUp 1.5s ease-out;
        }
        
        .letter {
            background: linear-gradient(180deg, #fdf8f0 0%, #f5ebe0 50%, #ede4d4 100%);
            border-radius: 4px;
            padding: 50px 55px;
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.4),
                inset 0 0 80px rgba(139, 90, 43, 0.08);
            position: relative;
            border: 1px solid #d4c4a8;
        }
        
        .letter::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px double #c9a86c;
            border-radius: 2px;
            pointer-events: none;
            opacity: 0.5;
        }
        
        .wax-seal {
            position: absolute;
            top: -30px;
            right: 40px;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #b22234, #8b0000 60%, #5c0011);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 
                0 8px 20px rgba(0,0,0,0.4),
                inset 0 -3px 8px rgba(0,0,0,0.3),
                inset 0 3px 8px rgba(255,255,255,0.15);
            z-index: 10;
            animation: sealDrop 0.8s ease-out 0.5s both;
        }
        
        .wax-seal::after {
            content: '♥';
            font-size: 28px;
            color: rgba(255,220,220,0.9);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        
        .date {
            text-align: right;
            font-family: 'Dancing Script', cursive;
            font-size: 1.1em;
            color: #8b7355;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        
        .greeting {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 1px solid #d4c4a8;
        }
        
        .greeting h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8em;
            color: #8b0000;
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            animation: fadeIn 1s ease-out 1s both;
        }
        
        .greeting .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 1.15em;
            color: #a0522d;
            font-style: italic;
            letter-spacing: 2px;
            animation: fadeIn 1s ease-out 1.3s both;
        }
        
        .content {
            font-family: 'Playfair Display', serif;
            font-size: 1.08em;
            line-height: 2;
            color: #3d2914;
            text-align: justify;
            animation: fadeIn 1.5s ease-out 1.6s both;
        }
        
        .content p {
            margin-bottom: 22px;
            text-indent: 2em;
        }
        
        .content p:last-child {
            margin-bottom: 0;
        }
        
        .highlight {
            color: #8b0000;
            font-style: italic;
        }
        
        .signature-section {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid #d4c4a8;
            text-align: right;
            animation: fadeIn 1s ease-out 2s both;
        }
        
        .closing {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1em;
            color: #5d4037;
            margin-bottom: 20px;
        }
        
        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 2.2em;
            color: #8b0000;
        }
        
        .corner-flourish {
            position: absolute;
            width: 60px;
            height: 60px;
            opacity: 0.3;
            pointer-events: none;
        }
        
        .corner-flourish.top-left {
            top: 30px;
            left: 30px;
            border-top: 3px solid #8b7355;
            border-left: 3px solid #8b7355;
        }
        
        .corner-flourish.top-right {
            top: 30px;
            right: 30px;
            border-top: 3px solid #8b7355;
            border-right: 3px solid #8b7355;
        }
        
        .corner-flourish.bottom-left {
            bottom: 30px;
            left: 30px;
            border-bottom: 3px solid #8b7355;
            border-left: 3px solid #8b7355;
        }
        
        .corner-flourish.bottom-right {
            bottom: 30px;
            right: 30px;
            border-bottom: 3px solid #8b7355;
            border-right: 3px solid #8b7355;
        }
        
        .floating-petals {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
        
        .petal {
            position: absolute;
            font-size: 18px;
            opacity: 0;
            animation: fall linear infinite;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(60px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes sealDrop {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.5);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        @media (max-width: 600px) {
            .letter {
                padding: 35px 28px;
            }
            
            .greeting h1 {
                font-size: 2em;
            }
            
            .content {
                font-size: 1em;
                line-height: 1.9;
            }
            
            .wax-seal {
                width: 55px;
                height: 55px;
                top: -22px;
                right: 25px;
            }
            
            .wax-seal::after {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
